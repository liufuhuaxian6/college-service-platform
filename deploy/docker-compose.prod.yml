services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-college_service}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 中文 Embedding 服务（BGE-small-zh-v1.5，512维）
  # 离线部署: 用 ghcr.nju.edu.cn 镜像 + 挂载预下载的 ./models/bge-small-zh-v1.5/
  # 规避 TEI 1.5 自带下载器的 HF_ENDPOINT bug
  embedding:
    image: ghcr.nju.edu.cn/huggingface/text-embeddings-inference:cpu-1.5
    command: --model-id /models/bge-small-zh-v1.5 --max-batch-tokens 16384
    expose:
      - "80"
    volumes:
      - ./models/bge-small-zh-v1.5:/models/bge-small-zh-v1.5:ro
      - tei-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: college-backend:1.0.0
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-college_service}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      AI_PROVIDER: ${AI_PROVIDER:-none}
      AI_API_URL: ${AI_API_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-5000}
      RAG_EMBEDDING_API_URL: http://embedding:80/v1/embeddings
      # 邮件 SMTP (模块三): 通过 .env 注入授权码, 缺失则自动降级为 email_sim
      # 默认 RUC 学校邮箱 (网易企业邮杭州节点, 已实测), 详见 deploy/.env.prod
      MAIL_HOST: ${MAIL_HOST:-smtphz.qiye.163.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-2024201564@ruc.edu.cn}
      MAIL_AUTH_CODE: ${MAIL_AUTH_CODE:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_healthy
    volumes:
      - upload-data:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./admin:/usr/share/nginx/html/admin
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
  redis-data:
  upload-data:
  tei-data:
