server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.ruc.college.module.*.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT
jwt:
  secret: college-service-platform-secret-key-must-be-at-least-256-bits-long
  expiration: 86400000  # 24 hours

# AI 配置 (预留, 后续填入具体模型)
ai:
  provider: none  # none / http / wenxin / qianfan / openai
  api-key: ""
  api-url: ""
  timeout-ms: 5000

# RAG / 向量检索配置
# 已切换至 BGE-small-zh-v1.5（中文专项，512维）通过 TEI HTTP 服务调用
rag:
  enabled: true
  embedding-dim: 512
  chunk-size: 700
  chunk-overlap: 120
  top-k: 4
  min-score: 0.5        # 原始余弦阈值（不含加权）, BGE-small 中文模型上 0.5 大致区分"相关 vs 不相关"
  extractive-confidence: 55   # 抽取式回答最低置信度（=vector*100 + 关键词/意图/受众加权和）; 低于则回兜底

  rerank-pool-size: 20  # 从向量库召回多少候选送入重排（topK 的倍数，原硬编码 max(100, topK*20)）
  embedding:
    provider: http      # local-hash / http
    # TEI（HuggingFace Text Embeddings Inference）OpenAI 兼容端点
    # 本机开发: http://localhost:8081/v1/embeddings
    # 容器内调用: http://embedding:80/v1/embeddings
    api-url: "${RAG_EMBEDDING_API_URL:http://localhost:8081/v1/embeddings}"
    api-key: ""
    timeout-ms: 8000
    # BGE 系列模型推荐对 query 加前缀以提升检索召回率
    query-prefix: "为这个句子生成表示以用于检索相关文章："

# 文件上传
file:
  upload-path: ./uploads
  max-size: 31457280  # 30MB

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
