server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.ruc.college.module.*.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT
jwt:
  secret: college-service-platform-secret-key-must-be-at-least-256-bits-long
  expiration: 86400000  # 24 hours

# AI 配置 (预留, 后续填入具体模型)
ai:
  provider: none  # none / wenxin / qianfan / openai
  api-key: ""
  api-url: ""

# 文件上传
file:
  upload-path: ./uploads
  max-size: 31457280  # 30MB

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
