services:
  # PostgreSQL 数据库（生产环境如有 Kingbase 可替换镜像）
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-college_service}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./deploy/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 中文 Embedding 服务（HuggingFace TEI + BGE-small-zh-v1.5，512 维）
  # 国内访问注意：
  #   1. 镜像使用 ghcr.nju.edu.cn (南京大学 GHCR 镜像)，比 ghcr.io 稳定
  #   2. HF_ENDPOINT 指向 hf-mirror.com，让模型从 HF 国内镜像下载
  #   3. 首次启动需要 1-3 分钟下载模型（约 95MB），后续启动直接用缓存
  #   4. 离线场景请提前 docker save / load
  embedding:
    image: ghcr.nju.edu.cn/huggingface/text-embeddings-inference:cpu-1.5
    # 使用本地预下载的 BGE-small-zh-v1.5 模型（绕过 TEI 1.5 的 HF_ENDPOINT bug）
    # 模型在 ./models/bge-small-zh-v1.5 -> 容器 /models/bge-small-zh-v1.5
    command: --model-id /models/bge-small-zh-v1.5 --max-batch-tokens 16384
    ports:
      - "8081:80"
    volumes:
      - ./models/bge-small-zh-v1.5:/models/bge-small-zh-v1.5:ro
      - tei-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Redis 缓存
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Spring Boot 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-college_service}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-DefaultDevSecretKeyMustBeAtLeast32Bytes!!}
      RAG_EMBEDDING_API_URL: http://embedding:80/v1/embeddings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_healthy
    volumes:
      - upload-data:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx 反向代理 + 前端静态文件
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend-admin/dist:/usr/share/nginx/html/admin
      - ./deploy/ssl:/etc/nginx/ssl
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
  redis-data:
  upload-data:
  tei-data:
