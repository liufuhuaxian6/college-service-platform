version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_PASSWORD=kingbase123
      - REDIS_HOST=redis
    depends_on:
      - kingbase
      - redis
    volumes:
      - upload-data:/app/uploads
    restart: unless-stopped

  # Kingbase 数据库
  kingbase:
    image: kingbase/kingbase:v8
    ports:
      - "54321:54321"
    environment:
      - DB_USER=system
      - DB_PASSWORD=kingbase123
      - DB_NAME=college_service
    volumes:
      - kb-data:/var/lib/kingbase/data
      - ./deploy/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # Nginx 反向代理 + 前端静态文件
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend-admin/dist:/usr/share/nginx/html/admin
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  kb-data:
  redis-data:
  upload-data:
